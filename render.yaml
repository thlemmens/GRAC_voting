services:
  - type: web
    name: group-allocator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.13"
      - key: SECRET_KEY
        generateValue: true
